# specs/sources.toml: pinned SDMX schema sources.
#
# The repo tracks PINS, never the xsd schema files. This file is the single
# source of truth for BOTH:
#   - the Nix fixed-output derivation in flake.nix (per-edition commit + NAR
#     hash), read via builtins.fromTOML; and
#   - the shell verify gate (scripts/fetch-specs.sh), which re-checks each
#     file sha256 after materialising (a transport-independent content gate).
#
# Records are trust-on-first-use, captured by scripts/update-specs.sh at the
# pinned commit. Blob URLs are derived as
#   https://github.com/<owner>/<repo>/blob/<rev>/schemas/<file>
# (+ a per-symbol #L anchor in docs/decisions.md). GENERATED, re-pin with
# 'just update-specs <edition> <ref>'; see specs/README.md for the procedure.


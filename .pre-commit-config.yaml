minimum_pre_commit_version: '3.3.0'

repos:
  # 1. Sanitization Suite (Securely SHA-pinned to v6.0.0)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c # v6.0.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-symlinks
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: [--fix=lf]

  # 2. Secret Leak Prevention (Securely SHA-pinned to v8.30.0)
  - repo: https://github.com/gitleaks/gitleaks
    rev: 2ca41cc1372d1e939a6a879f18cdc19fc1cac1ce # v8.30.0
    hooks:
      - id: gitleaks

  # 3. Conventional Commit Enforcement (Securely SHA-pinned to v9.25.0 - locks in Git-Cliff accuracy!)
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: 1d7031e6d0bbfce76e5a625b0cec24fb22e517a0 # v9.25.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ['@commitlint/config-conventional']

  # 4. Rust Formatting Check (Runs on commit to enforce consistent code style)
  - repo: local
    hooks:
      - id: rust-fmt
        name: format-with-nightly-rustfmt
        entry: nix develop --command just fmt
        language: system
        files: '\.rs$'
        pass_filenames: false
        stages: [pre-commit]

  # 5. Local Rust Quality Gate (Runs only on push when Rust/TOML files change)
  - repo: local
    hooks:
      - id: verify-gate-rust
        name: run-just-verify-rust
        entry: nix develop --command just verify-rust
        language: system
        files: '\.(rs|toml)$|Cargo\.lock'
        pass_filenames: false
        stages: [pre-push]

  # 6. Local Scripts Quality Gate (Runs only on push when script/bats files change)
  - repo: local
    hooks:
      - id: verify-gate-scripts
        name: run-just-verify-scripts
        entry: nix develop --command just verify-scripts
        language: system
        files: '\.(sh|bats)$'
        pass_filenames: false
        stages: [pre-push]

  # 7. Local Docs Quality Gate (runs on push when Markdown OR crate sources
  #    change: verify-docs reads .rs too, for decision-reference resolution
  #    (check-decision-refs) and the XSD-fragment cross-check)
  - repo: local
    hooks:
      - id: verify-gate-docs
        name: run-just-verify-docs
        entry: nix develop --command just verify-docs
        language: system
        files: '\.(md|rs)$'
        pass_filenames: false
        stages: [pre-push]

  # 8. Local Nix/Infra Quality Gate (Runs only on push when nix files change)
  - repo: local
    hooks:
      - id: verify-gate-infra
        name: run-just-verify-infra
        entry: nix develop --command just verify-infra
        language: system
        files: '\.nix$|flake\.lock'
        pass_filenames: false
        stages: [pre-push]

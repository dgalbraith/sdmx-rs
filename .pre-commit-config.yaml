minimum_pre_commit_version: '3.3.0'

repos:
  # 1. Sanitisation Suite (Securely SHA-pinned to v6.0.0)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c # v6.0.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-symlinks
      - id: detect-private-key
      # Mutating fixers run at commit only (like rust-fmt below). At pre-push
      # pre-commit feeds them the push range's files, which includes the
      # gitignored, fetched-on-demand specs/ + xsd-fragments build artefacts
      # (raw-upstream CRLF/trailing-tab/no-final-newline) they must not rewrite.
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: mixed-line-ending
        args: [--fix=lf]
        stages: [pre-commit]

  # 2. Secret Leak Prevention (Securely SHA-pinned to v8.30.0)
  - repo: https://github.com/gitleaks/gitleaks
    rev: 2ca41cc1372d1e939a6a879f18cdc19fc1cac1ce # v8.30.0
    hooks:
      - id: gitleaks

  # 3. Conventional Commit Enforcement (Securely SHA-pinned to v9.25.0 - locks in Git-Cliff accuracy!)
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: 1d7031e6d0bbfce76e5a625b0cec24fb22e517a0 # v9.25.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ['@commitlint/config-conventional']

  # 4. Rust Formatting Check (Runs on commit to enforce consistent code style)
  - repo: local
    hooks:
      - id: rust-fmt
        name: format-with-nightly-rustfmt
        entry: nix develop --command just fmt
        language: system
        files: '\.rs$'
        pass_filenames: false
        stages: [pre-commit]

  # 5. Direct-Push Guard (pre-push): refuse a push to `main` that skipped the
  #    staging CI round-trip. Runs first and cheaply (one `git ls-remote`) so an
  #    accidental `git push origin main` is caught before the verify gates below
  #    spend minutes on a push that must not land. This is an accident guard, not
  #    a forge gate — the maintainer can override (SDMX_ALLOW_DIRECT_MAIN=1).
  - repo: local
    hooks:
      - id: guard-main-push
        name: guard-direct-push-to-main
        entry: scripts/guard-main-push.sh
        language: script
        pass_filenames: false
        always_run: true
        stages: [pre-push]

  # 6. Local Rust Quality Gate (Runs only on push when Rust/TOML files change)
  - repo: local
    hooks:
      - id: verify-gate-rust
        name: run-just-verify-rust
        entry: nix develop --command just verify-rust
        language: system
        files: '\.(rs|toml)$|Cargo\.lock'
        pass_filenames: false
        stages: [pre-push]

  # 7. Local Scripts Quality Gate (Runs only on push when script/bats files change)
  - repo: local
    hooks:
      - id: verify-gate-scripts
        name: run-just-verify-scripts
        entry: nix develop --command just verify-scripts
        language: system
        files: '\.(sh|bats)$'
        pass_filenames: false
        stages: [pre-push]

  # 8. Local Docs Quality Gate (runs on push when Markdown OR crate sources
  #    change: verify-docs reads .rs too, for decision-reference resolution
  #    (check-decision-refs) and the XSD-fragment cross-check)
  - repo: local
    hooks:
      - id: verify-gate-docs
        name: run-just-verify-docs
        entry: nix develop --command just verify-docs
        language: system
        files: '\.(md|rs)$'
        pass_filenames: false
        stages: [pre-push]

  # 9. Local Nix/Infra Quality Gate (Runs only on push when nix files change)
  - repo: local
    hooks:
      - id: verify-gate-infra
        name: run-just-verify-infra
        entry: nix develop --command just verify-infra
        language: system
        files: '\.nix$|flake\.lock'
        pass_filenames: false
        stages: [pre-push]

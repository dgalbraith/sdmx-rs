name: Publish

# Triggered by release tag pushes matching the cargo-release convention
# "<crate>/v<version>" (see release.toml tag-name). The glob's `*` does not
# span `/`, so it matches "sdmx-types/v0.1.0" but not arbitrary tags (e.g. a
# personal "wip" or a docs tag), which must never spin up the publish chain.
#
# Per-crate dispatch: the tag selects exactly ONE crate to publish. The `setup`
# job parses the tag and asserts the version it names matches that crate's
# Cargo.toml, binding the publish to the signed tag (the trust anchor). A batch
# release pushes one tag per crate, yielding one independent single-crate run
# each — correct in both the pre-1.0 lockstep phase and the post-1.0 per-crate
# phase, with no reliance on "publish all, skip the rest". A run waits for its
# own workspace dependencies to be indexed before publishing, so cross-crate
# ordering within a batch is enforced by the index, not by a static job chain.
#
# The verify-signature and check-changelog jobs gate every run — nothing
# publishes unless the tag is maintainer-signed and all changelogs are synced.

on:
  push:
    tags: [ 'sdmx-*/v*' ]

env:
  CARGO_TERM_COLOR: always

# No workflow-level permissions — each job declares only what it needs.

concurrency:
  # Keyed on the tag ref: each crate's tag is its own run. Two pushes of the
  # same tag (a re-trigger) serialise rather than race on the GitHub Release.
  group: ${{ github.workflow }}-${{ github.ref }}
  # Tag runs are never cancelled: publishing is irreversible.
  cancel-in-progress: false

jobs:

  # ---------------------------------------------------------------------------
  # Gate 1: Maintainer signature enforcement (reusable workflow)
  # ---------------------------------------------------------------------------
  verify-signature:
    name: Verify Maintainer Signature
    uses: ./.github/workflows/verify-signature.yml

  # ---------------------------------------------------------------------------
  # Gate 2: Changelog synchronisation check
  # ---------------------------------------------------------------------------
  check-changelog:
    name: Changelog Synchronisation Check
    runs-on: ubuntu-latest
    needs: [verify-signature]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Nix
        uses: ./.github/actions/setup-nix

      - name: Verify Changelog Synchronisation
        run: nix develop --command just check-changelog

  # ---------------------------------------------------------------------------
  # Setup: parse the triggering tag into {crate, version, crate_file} and assert
  # the tag version matches the crate's Cargo.toml. Binds the run to the tag.
  # ---------------------------------------------------------------------------
  setup:
    name: Resolve Release Tag
    runs-on: ubuntu-latest
    needs: [check-changelog]
    permissions:
      contents: read
    outputs:
      crate: ${{ steps.tag.outputs.crate }}
      version: ${{ steps.tag.outputs.version }}
      crate_file: ${{ steps.tag.outputs.crate_file }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Nix
        uses: ./.github/actions/setup-nix

      - name: Parse and verify release tag
        id: tag
        run: nix develop --command scripts/ci/parse-release-tag.sh "${{ github.ref_name }}"

  # ---------------------------------------------------------------------------
  # Gate 3: Source-in-main enforcement.
  # Publishing keys off a pushed tag and is irreversible, and a tag commit can be
  # pushed before the release branch is merged into main. Assert the tag's commit
  # is reachable from origin/main BEFORE the publish job runs, so a crate can
  # never go live with source that is absent from the canonical branch.
  # ---------------------------------------------------------------------------
  verify-tag-on-main:
    name: Verify Source In Main
    runs-on: ubuntu-latest
    needs: [setup]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Verify tag commit is reachable from main
        run: scripts/ci/verify-tag-on-main.sh "$GITHUB_SHA"

  # ---------------------------------------------------------------------------
  # Publish: the single crate named by the tag.
  # Flow: wait-for-deps → check-published → package → publish (verify) →
  #       wait-for-index → SBOM ×2 → attest ×3 → GitHub Release.
  # All actions are SHA-pinned; versions noted in comments.
  # ---------------------------------------------------------------------------
  publish:
    name: Publish ${{ needs.setup.outputs.crate }}
    runs-on: ubuntu-latest
    needs: [setup, verify-tag-on-main]
    environment: release
    permissions:
      id-token: write
      contents: write
      attestations: write
    env:
      CRATE: ${{ needs.setup.outputs.crate }}
      VERSION: ${{ needs.setup.outputs.version }}
      CRATE_FILE: ${{ needs.setup.outputs.crate_file }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Nix
        uses: ./.github/actions/setup-nix

      - name: Authenticate to crates.io (Trusted Publishing)
        id: auth
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4

      # Wait for this crate's workspace deps to be on the index (they were
      # published by their own tagged runs) so the verify-compile can resolve
      # them. No-op for sdmx-types, which has no workspace deps.
      - name: Wait for workspace dependencies
        run: nix develop --command scripts/ci/wait-for-deps.sh "$CRATE"

      - name: Check if version already published
        id: published
        run: nix develop --command scripts/ci/check-published.sh "$CRATE" "$VERSION"

      # Package unconditionally: the .crate artifact is the attestation subject
      # and a GitHub Release asset, both of which are (re)produced even on a
      # re-run where the version is already on crates.io.
      - name: Package crate
        run: nix develop --command cargo package --manifest-path "crates/${CRATE}/Cargo.toml" --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      # Publish WITH verification (no --no-verify): cargo compiles the packaged
      # crate against its registry dependencies, catching "builds in-workspace
      # via path deps but broken once published" errors that `cargo check
      # --workspace` cannot. Publishing is irreversible, so this compile is
      # mandatory insurance — do not add --no-verify to save CI minutes.
      - name: Publish to crates.io
        if: steps.published.outputs.exists == 'false'
        run: nix develop --command cargo publish --manifest-path "crates/${CRATE}/Cargo.toml" --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Wait for crates.io index
        if: steps.published.outputs.exists == 'false'
        run: nix develop --command scripts/ci/wait-for-index.sh "$CRATE" "$VERSION"

      # Prove the bytes we are about to attest are the bytes crates.io serves.
      # Runs unconditionally (even on an idempotent re-run where publish was
      # skipped) so the attestation subject is always validated against the
      # registry before anything is signed. Fails hard on a SHA-256 mismatch.
      - name: Compare packaged crate against registry
        run: nix develop --command scripts/ci/compare-registry-crate.sh "$CRATE" "$VERSION" "$CRATE_FILE"

      - name: Generate CycloneDX SBOM
        run: |
          nix develop --command cargo cyclonedx \
            --manifest-path "crates/${CRATE}/Cargo.toml" \
            --format json \
            --override-filename "${CRATE}.cdx"
          mv "crates/${CRATE}/${CRATE}.cdx.json" "${CRATE}.cdx.json"

      - name: Convert CycloneDX SBOM to SPDX
        run: |
          nix develop --command cyclonedx convert \
            --input-file "${CRATE}.cdx.json" \
            --output-file "${CRATE}.spdx.json" \
            --output-format spdxjson

      - name: Attest build provenance (SLSA L2)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ env.CRATE_FILE }}

      - name: Attest CycloneDX SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: ${{ env.CRATE_FILE }}
          sbom-path: ${{ env.CRATE }}.cdx.json

      - name: Attest SPDX SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: ${{ env.CRATE_FILE }}
          sbom-path: ${{ env.CRATE }}.spdx.json

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          nix develop --command scripts/ci/create-release.sh \
            "$CRATE" "$VERSION" \
            "$CRATE_FILE" \
            "${CRATE}.cdx.json" "${CRATE}.spdx.json"

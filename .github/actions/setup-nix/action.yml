name: Set up Nix
description: >-
  Install Nix and restore/save the Nix store from the GitHub Actions cache,
  size-bounded via pre-save garbage collection so it shares the repo-wide
  ~10 GB cache budget with the cargo and sccache caches. Centralises the Nix
  CI setup (replaces the deprecated magic-nix-cache-action) so every job uses a
  single, SHA-pinned definition.

inputs:
  gc-max-store-size:
    description: >-
      Upper bound, in bytes, on the saved Nix store after garbage collection.
      Keeps this cache within the shared repo-wide budget. Applied per-OS below.
      Jobs that run `nix build` (not just `nix develop`) may raise this.
    required: false
    default: "5368709120" # 5 GiB
  cache-key-suffix:
    description: >-
      Scopes the nix store cache to a job role. The lighter `nix develop` jobs
      realise only the dev-shell closure; nix-check additionally builds crane's
      cargoArtifacts (the heavy dependency closure). Sharing one key lets the
      faster lighter jobs win the save race with a cargoArtifacts-less store, so
      nix-check's closure never persists. nix-check passes a distinct suffix to
      get its own cache; the default (empty) is the dev-shell-only key.
    required: false
    default: ""
  github-token:
    description: >-
      Optional token written to nix.conf as `access-tokens = github.com=<token>`.
      The fetch-on-demand schema derivation (`nix build .#sdmxSpecs`) fetches the
      pinned SDMX tree from github.com; an anonymous fetch is rate-limited (60/hr),
      a flaky-failure axis distinct from availability on the now-required
      fetch-gated jobs. Only those jobs (docs-internal, check-xsd-fragments) pass
      the workflow GITHUB_TOKEN secret; every other job leaves it empty (no fetch).
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install Nix
      uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      with:
        # Plain upstream Nix only. `determinate` defaults to true, which installs
        # Determinate Nix and attempts a FlakeHub OIDC login — we want neither
        # (we cache via cache-nix-action, not FlakeHub).
        determinate: false
        # Disable store optimisation. The nix-installer sets auto-optimise-store = true
        # on Linux by default. cache-nix-action cannot reliably restore an
        # optimised store — tar extracts hard links sequentially and .links/
        # targets may not exist at extraction time, leaving a corrupt store.
        # See: https://github.com/nix-community/cache-nix-action/issues/170
        #
        # `access-tokens` is appended only when a caller passes `github-token`
        # (the fetch-gated jobs): it authenticates the `.#sdmxSpecs` FOD fetch to
        # github.com so it is not anonymously rate-limited. Empty input renders a
        # blank line (harmless in nix.conf); the GITHUB_TOKEN is masked in logs.
        extra-conf: |
          auto-optimise-store = false
          ${{ inputs.github-token && format('access-tokens = github.com={0}', inputs.github-token) || '' }}

    - name: Cache Nix store
      uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
      with:
        # OS/arch-namespaced. Keyed on flake.nix + flake.lock + Cargo.lock: the
        # flake checks build crane's cargoArtifacts (the dependency closure),
        # whose derivation depends on all three, so the cache key must rotate on
        # any of them or the rebuilt deps can never be persisted (the immutable
        # primary key already exists, so the save is skipped). flake.nix is in
        # the key because it defines the derivations: a build-config change must
        # invalidate the store cache. Mirrors the cargo/sccache cache idiom:
        # exact key, then prefix fallback. runner.arch is included because the
        # macOS runner fleet spans arm64/x86_64. cache-key-suffix scopes the key
        # by job role so nix-check's heavy cargoArtifacts cache is not raced by
        # the lighter dev-shell jobs (see inputs).
        primary-key: nix-${{ runner.os }}-${{ runner.arch }}-${{ inputs.cache-key-suffix && format('{0}-', inputs.cache-key-suffix) || '' }}${{ hashFiles('flake.nix', 'flake.lock', '**/Cargo.lock') }}
        restore-prefixes-first-match: nix-${{ runner.os }}-${{ runner.arch }}-${{ inputs.cache-key-suffix && format('{0}-', inputs.cache-key-suffix) || '' }}
        # Size-bound the saved store via GC (shared ~10 GB budget). BOTH OS
        # inputs must be set: on macOS, GC is SKIPPED unless the -macos input is
        # present. Set defensively even though only Linux jobs use Nix today.
        gc-max-store-size-linux: ${{ inputs.gc-max-store-size }}
        gc-max-store-size-macos: ${{ inputs.gc-max-store-size }}

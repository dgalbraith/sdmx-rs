# sdmx-rs Maintenance Policy Ledger
# Single source of truth for periodic maintenance obligations.
#
# Each [[maintenance]] block tracks:
#   - item: identifier (slug format)
#   - file: source file where this work happens
#   - marker: comment marker to find inline breadcrumb
#   - review_cadence: days between reviews
#   - warn_threshold: warn if not updated this many days
#   - fail_threshold: fail CI if overdue this many days
#   - last_updated: ISO 8601 date (when work was last done)
#   - next_review: ISO 8601 date (when to review next)
#
# Validation: check-maintenance.sh verifies:
#   1. Inline comments exist in named files with marker
#   2. Inline dates match this config (catch drift)
#   3. next_review has not passed (fail if overdue)
#   4. Days since last_updated < warn_threshold (warn if stale)
#
# Commented items: Phase 2+ features. Uncomment and set dates when phase starts.
# For automation: scripts/maintenance-bump.sh <item> updates both this file and inline comments.

[[maintenance]]
item = "rustfmt-date-bump"
file = "flake.nix"
marker = "# MAINTENANCE: rustfmt-date-bump"
review_cadence = 60
warn_threshold = 90
fail_threshold = 120
last_updated = "2026-05-30"
next_review = "2026-07-29"

[[maintenance]]
item = "msrv-upgrade-window"
file = "Cargo.toml"
marker = "# MAINTENANCE: msrv-upgrade-window"
review_cadence = 180
warn_threshold = 210
fail_threshold = 270
last_updated = "2026-06-30"
next_review = "2026-12-30"

# Periodic MANUAL dependency-freshness review (outdated-but-not-vulnerable
# hygiene). Security advisories and license conflicts are NOT gated by this
# cadence — `cargo deny` runs continuously in `verify` on every push plus the
# scheduled CI job, so the urgent surface is always covered. This item is the
# slower hygiene pass: review `just outdated`, then remediate with
# `just update-deps` / `just update-flake`. Cadence relaxed to quarterly to suit
# a part-time single-maintainer cadence (was 30/60/90).
[[maintenance]]
item = "dependency-audit"
file = ".github/workflows/ci.yml"
marker = "# MAINTENANCE: dependency-audit"
review_cadence = 90
warn_threshold = 150
fail_threshold = 210
last_updated = "2026-05-30"
next_review = "2026-08-28"

[[maintenance]]

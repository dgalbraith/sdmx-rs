# Deadline-driven item (not a rolling cadence): the maintainer signing subkey
# [S] expires 2027-12-31. next_review is set to ~90 days before expiry so the
# weekly scheduled job opens a renewal tracking issue with runway to rotate.
# The OVERDUE check (next_review passed) is the real trigger; warn/fail
# thresholds are set wide so the staleness check does not fire spuriously
# before the deadline-based review date does. On rotation, run
# scripts/maintenance-bump.sh signing-subkey-renewal — note this resets
# next_review to today + review_cadence, so manually set next_review to ~90
# days before the NEW subkey's expiry afterwards.
[[maintenance]]
item = "signing-subkey-renewal"
file = ".github/workflows/verify-signature.yml"
marker = "# MAINTENANCE: signing-subkey-renewal"
review_cadence = 730
warn_threshold = 730
fail_threshold = 760
last_updated = "2026-05-30"
next_review = "2027-10-01"


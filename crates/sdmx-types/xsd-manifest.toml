# Time periods: StandardTimePeriodType (the union) is cited by both SdmxTimePeriod
# and the SdmxTimePeriodKind classifier, the shared-symbol / multi-rust case. Its
# members carry the actual grammar and are cited by the Kind enum.
[[fragment]]
symbol = "StandardTimePeriodType"
file = "schemas/SDMXCommon.xsd"
editions = ["3.0", "3.1"]
rust = ["SdmxTimePeriod", "SdmxTimePeriodKind"]

